<!-- Portfolio Modals -->
{% for project in site.data.sitetext.portfolio.projects %}
<div class="portfolio-modal modal fade" id="p{{ forloop.index }}" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="close-modal" data-dismiss="modal">
                <div class="lr">
                    <div class="rl"></div>
                </div>
            </div>
            <div class="container">
                <div class="row">
                    <div class="col-lg-8 mx-auto">
                        <div class="modal-body">
                            <h2 class="text-uppercase">{{ project.title }}</h2>
                            <p class="item-intro text-muted">{{ project.subtitle }}</p>
                            <img class="img-fluid d-block mx-auto" src="{{ project.image }}" alt="{{ project.title }}">
                            <p>{{ project.description }}</p>
                            <ul class="list-inline">
                                <li>Date: {{ project.date }}</li>
                                <li>Client: {{ project.client }}</li>
                                <li>Category: {{ project.category }}</li>
                            </ul>
                            <button class="btn btn-primary" data-dismiss="modal" type="button">
                                <i class="fas fa-times"></i>
                                Fechar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endfor %}
