<!-- Contact -->
<section class="page-section" id="contact">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading text-uppercase">{{ site.data.sitetext.contact.title }}</h2>
                <h3 class="section-subheading text-muted">{{ site.data.sitetext.contact.text }}</h3>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12">
                <ul class="list-inline social-buttons text-center">
                    {% for social in site.data.sitetext.social %}
                    <li class="list-inline-item">
                        <a href="{{ social.url }}" target="_blank" rel="noopener">
                            <i class="fab {{ social.icon }}"></i>
                        </a>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</section>
