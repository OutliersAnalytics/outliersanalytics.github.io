<!-- Portfolio Grid / Projetos -->
<section class="page-section bg-light" id="portfolio">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading text-uppercase">{{ site.data.sitetext.portfolio.title }}</h2>
                <h3 class="section-subheading text-muted">{{ site.data.sitetext.portfolio.text }}</h3>
            </div>
        </div>
        <div class="row">
            {% for project in site.data.sitetext.portfolio.projects %}
            <div class="col-md-6 col-sm-6 portfolio-item">
                <a class="portfolio-link" href="{{ project.url }}" target="_blank" rel="noopener">
                    <div class="portfolio-hover">
                        <div class="portfolio-hover-content">
                            <i class="fas fa-plus fa-3x"></i>
                        </div>
                    </div>
                    <img class="img-fluid" src="{{ project.image }}" alt="{{ project.title }}">
                </a>
                <div class="portfolio-caption">
                    <h4>{{ project.title }}</h4>
                    <p class="text-muted">{{ project.subtitle }}</p>
                    <p class="text-muted">{{ project.description }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
