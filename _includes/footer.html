<!-- Footer -->
<footer class="footer" id="footer">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-4">
                <span class="copyright">{{ site.data.sitetext.footer.copyright }}</span>
            </div>
            <div class="col-md-4">
                <ul class="list-inline social-buttons">
                    {% for social in site.data.sitetext.footer.social %}
                    <li class="list-inline-item">
                        <a href="{{ social.url }}" target="_blank" rel="noopener">
                            <i class="fab {{ social.icon }}"></i>
                        </a>
                    </li>
                    {% endfor %}
                </ul>
            </div>
            <div class="col-md-4">
                <ul class="list-inline quicklinks">
                    <li class="list-inline-item">
                        <a href="https://github.com/OutliersAnalytics/outliersanalytics.github.io" target="_blank"
                            rel="noopener">
                            <i class="fab fa-github"></i> GitHub
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</footer>
